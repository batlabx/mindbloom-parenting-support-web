  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-primary: #4E8B83;
      --brand-background: #FAF9F6;
      --brand-card: #EEF5F4;
      --brand-neutral: #F1F1F1;
      --brand-heading: #2E2E2E;
      --brand-body: #3B3B3B;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--brand-background);
      color: var(--brand-body);
      scroll-behavior: smooth;
      font-size: 15px;
      overflow-x: hidden;
    }
    p, li, h1, h2, h3, h4, span {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    h1, h2, h3, h4, .font-display {
      font-family: 'Fredoka', sans-serif;
      color: var(--brand-heading);
    }
    .glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .card-shadow {
      box-shadow: 0 8px 30px rgba(46, 46, 46, 0.05);
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(46, 46, 46, 0.08);
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    /* Simple Tailwind extensions for new colors */
    .bg-brand-primary { background-color: var(--brand-primary); }
    .text-brand-primary { color: var(--brand-primary); }
    .bg-brand-background { background-color: var(--brand-background); }
    .bg-brand-card { background-color: var(--brand-card); }
    .text-brand-body { color: var(--brand-body); }
    .text-brand-heading { color: var(--brand-heading); }
    .border-brand-primary { border-color: var(--brand-primary); }
  </style>
